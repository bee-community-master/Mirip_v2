[offer_filters]
gpu_name = ["RTX PRO 4500 Blackwell"]
num_gpus = 1
gpu_ram_gb = 32
reliability = 0.99
verified = true
rentable = true
type = "ondemand"
limit = 5

[instance]
image = "pytorch/pytorch:2.7.1-cuda12.8-cudnn9-runtime"
disk_gb = 120
runtype = "ssh_direct"
label = "mirip-v2-dinov3-prep"
cancel_unavail = true
env = { HF_HOME = "/workspace/.cache/huggingface", TRANSFORMERS_CACHE = "/workspace/.cache/huggingface", PIP_DISABLE_PIP_VERSION_CHECK = "1" }
ports = ["8080:8080"]
onstart = """
env >> /etc/environment
mkdir -p /workspace/.cache/huggingface
"""

[workspace]
remote_root = "/workspace/mirip_v2"
sync_paths = [
  "configs",
  "docs",
  "scripts",
  "training",
  "roadmap.md",
  "README.md",
]
